<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Favorito — Início</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="crt-overlay"></div>
<div id="ink-progress"><div id="ink-progress-fill"></div></div>

<div class="wrap">
  <header class="site">
    <div class="brand">
      <span class="mark">GAME FAVORITO</span>
    </div>
    <nav class="site">
      <a href="index.html" class="active" id="nav-home">Início</a>
      <div class="nav-dropdown">
        <a id="nav-materias" tabindex="0" role="button" aria-haspopup="true">Matérias</a>
        <div class="dropdown-menu">
          <a href="retro.html" data-cat="Retrô"><span class="dd-icon"></span>Retrô</a>
          <a href="atuais.html" data-cat="Atuais"><span class="dd-icon"></span>Atuais</a>
          <a href="revistas.html" data-cat="Revistas"><span class="dd-icon"></span>Revistas</a>
          <a href="detonados.html" data-cat="Detonados"><span class="dd-icon"></span>Detonados</a>
        </div>
      </div>
      <a href="noticias.html">Notícias</a>
      <a href="sobre.html">Sobre</a>
      <a href="contato.html">Contato</a>
      <button id="crt-toggle" aria-label="Ligar ou desligar efeito CRT" title="Efeito CRT">CRT: ON</button>
    </nav>
  </header>

  <section class="hero" id="view-hero">
    <img class="banner-svg" src="banner.png" alt="Game Favorito — Nostalgia que nunca acaba. Arte pixel art com personagens e castelos de RPGs clássicos." />
    <div class="eyebrow blink">▸ PRESS START</div>
    <a href="#" class="featured-post" id="featured-post" style="display:none;">
      <div class="featured-post-inner">
        <div class="fp-eyebrow" id="featured-eyebrow">MATÉRIA MAIS ACESSADA</div>
        <h2 id="featured-title"></h2>
        <p id="featured-excerpt"></p>
      </div>
    </a>
  </section>
</div>

<div class="site-light">
  <div class="wrap">
    <section class="controls">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Buscar por título ou palavra-chave...">
      </div>
      <div class="tags" id="tag-list"></div>
      <div class="result-count" id="result-count"></div>
    </section>

    <main>
      <section id="view-list">
        <div class="post-grid" id="post-grid"></div>
      </section>

      <section id="view-post" class="hidden">
        <button class="back-link" onclick="goHome()">◂ VOLTAR</button>
        <div class="post-header">
          <div class="eyebrow" id="post-eyebrow"></div>
          <h1 id="post-title"></h1>
          <div class="meta" id="post-meta"></div>
        </div>
        <div class="post-body" id="post-body"></div>

        <div class="likes-row">
          <button class="like-btn" id="post-like-btn">♥ <span id="post-like-count">0</span> curtidas</button>
        </div>

        <hr class="divider">

        <div class="comments">
          <h3 id="comments-title">COMENTÁRIOS</h3>

          <div class="auth-box" id="auth-box">
            <div class="auth-tabs">
              <button type="button" class="auth-tab active" id="tab-login">ENTRAR</button>
              <button type="button" class="auth-tab" id="tab-signup">CRIAR CONTA</button>
            </div>

            <form class="auth-form" id="login-form">
              <input type="email" id="login-email" placeholder="E-mail" required>
              <input type="password" id="login-password" placeholder="Senha" required>
              <button type="submit">ENTRAR</button>
              <div class="auth-msg" id="login-msg"></div>
            </form>

            <form class="auth-form hidden" id="signup-form">
              <input type="text" id="signup-name" placeholder="Seu nome" required>
              <input type="email" id="signup-email" placeholder="E-mail" required>
              <input type="password" id="signup-password" placeholder="Senha (mín. 6 caracteres)" required>
              <button type="submit">CRIAR CONTA</button>
              <div class="auth-msg" id="signup-msg"></div>
            </form>
          </div>

          <div class="logged-box hidden" id="logged-box">
            <div class="logged-as">Comentando como <strong id="logged-name"></strong> · <button type="button" id="logout-btn">Sair</button></div>
            <form class="comment-form" id="comment-form">
              <textarea id="comment-text" placeholder="Escreva um comentário..." rows="3" required></textarea>
              <button type="submit">PUBLICAR</button>
            </form>
          </div>

          <div id="comments-list"></div>
        </div>
      </section>
    </main>

    <footer class="simple">
      <div class="footer-meta">
        GAME FAVORITO © 2026<br>
        Feito com HTML, CSS e JavaScript puro.
      </div>
    </footer>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="materias.js"></script>
<script src="site.js"></script>
<script src="player.js"></script>
<script type="module" src="auth-comments.js"></script>

<script>
/* ============ DADOS: vêm todos do materias.js ============
   Pra publicar uma matéria nova, edite APENAS o arquivo
   materias.js — este script só decide como exibir o que
   estiver lá.
============================================================ */

/* Quantas matérias recentes aparecem na página inicial.
   Ao publicar uma matéria nova (com data mais recente) no
   materias.js, a mais antiga sai automaticamente da home —
   mas continua acessível para sempre na página da sua categoria. */
const HOME_LIMIT = 5;

function getHomePosts(){
  return [...MATERIAS]
    .sort((a, b) => new Date(b.date) - new Date(a.date))
    .slice(0, HOME_LIMIT);
}

/* ============ ESTADO ============ */
let currentCategory = null;
let currentPostId = null;

/* Nomes de exibição das categorias (com acento) — os valores
   salvos no materias.js ficam sem acento (Retro, Atuais,
   Revistas, Detonados) pra evitar erro de digitação. */
const CATEGORY_LABELS = {
  Retro: 'Retrô',
  Atuais: 'Atuais',
  Revistas: 'Revistas',
  Detonados: 'Detonados',
  Noticias: 'Notícias'
};

function formatDate(iso){
  const d = new Date(iso + "T12:00:00");
  return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' }).replace('.', '');
}

/* ============ FILTRO POR CATEGORIA ============ */
function renderTags(){
  const allCats = [...new Set(getHomePosts().map(p => p.category))];
  const tagList = document.getElementById('tag-list');
  tagList.innerHTML = '';
  const allChip = document.createElement('div');
  allChip.className = 'tag-chip' + (currentCategory === null ? ' active' : '');
  allChip.textContent = 'TODOS';
  allChip.onclick = () => { currentCategory = null; renderTags(); renderGrid(); };
  tagList.appendChild(allChip);
  allCats.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'tag-chip' + (currentCategory === cat ? ' active' : '');
    chip.textContent = (CATEGORY_LABELS[cat] || cat).toUpperCase();
    chip.onclick = () => { currentCategory = (currentCategory === cat ? null : cat); renderTags(); renderGrid(); };
    tagList.appendChild(chip);
  });
}

/* ============ DESTAQUE (hero) ============
   Mostra uma matéria em destaque logo abaixo do PRESS START.
   Pra escolher qual matéria aparece aqui, adicione a propriedade
   "featured: true" nela dentro do materias.js (só uma matéria deve
   ter essa propriedade por vez). Se nenhuma tiver, cai automaticamente
   para a mais recente. Adicione também "image: 'caminho/da/imagem.jpg'"
   na matéria pra mostrar uma imagem de fundo no destaque. */
function renderFeaturedPost(){
  const featured = MATERIAS.find(p => p.featured) || getHomePosts()[0];
  if (!featured) return;

  const el = document.getElementById('featured-post');
  document.getElementById('featured-title').textContent = featured.title;
  document.getElementById('featured-excerpt').textContent = featured.excerpt;

  if (featured.image){
    el.style.backgroundImage = `url('${featured.image}')`;
  }

  el.style.display = 'flex';
  el.onclick = (e) => { e.preventDefault(); openPost(featured.id); };
}

/* ============ CURTIDAS ============
   A CONTAGEM em si fica no Firestore (mesmo banco dos comentários),
   então é compartilhada de verdade entre todo mundo que visita o
   site — igual funciona pra qualquer pessoa ver o mesmo número.
   O que fica só neste navegador (localStorage) é apenas "eu já
   curti essa matéria", pra pintar o coração e não deixar a mesma
   pessoa curtir/descurtir sem parar. As funções que de fato falam
   com o Firestore (getLikesForPost, watchLikesForPost, hasLikedPost,
   toggleLikePost) vêm do auth-comments.js. */

function isLikedLocally(id){
  return window.hasLikedPost ? window.hasLikedPost(id) : (localStorage.getItem('gf_liked_' + id) === '1');
}

/* auth-comments.js é um "module", que carrega um pouquinho depois
   deste script — essa função espera ele ficar pronto antes de usar
   qualquer função de curtida/comentário vinda de lá. */
function whenFirebaseReady(cb){
  if (window.toggleLikePost) cb();
  else window.addEventListener('gf-firebase-ready', cb, { once: true });
}

/* Usada nos cards do grid (home): busca a contagem uma única vez.
   (Não usa "tempo real" aqui de propósito — o grid pode re-renderizar
   a cada letra digitada na busca, e não queremos abrir uma conexão
   nova do Firestore a cada tecla.) */
function wireLikeButtonStatic(id, btnEl, countEl){
  btnEl.classList.toggle('liked', isLikedLocally(id));
  whenFirebaseReady(() => {
    window.getLikesForPost(id).then(count => { countEl.textContent = count; });
  });
  btnEl.onclick = (e) => {
    if (e) e.stopPropagation();
    whenFirebaseReady(() => {
      window.toggleLikePost(id, (nowLiked) => {
        if (nowLiked === null) return; // deu erro, não muda nada na tela
        btnEl.classList.toggle('liked', nowLiked);
        const current = parseInt(countEl.textContent, 10) || 0;
        countEl.textContent = Math.max(0, current + (nowLiked ? 1 : -1));
      });
    });
  };
}

/* Usada na página de uma matéria aberta: aqui sim vale a pena
   "tempo real" (se outra pessoa curtir enquanto você está lendo, o
   número atualiza sozinho), mas só existe UM botão de curtir na
   tela por vez, então cancelamos a inscrição anterior sempre que
   uma matéria nova é aberta, pra não acumular conexões à toa. */
let unsubscribeLikes = null;
function wireLikeButtonLive(id, btnEl, countEl){
  btnEl.classList.toggle('liked', isLikedLocally(id));
  if (unsubscribeLikes){ unsubscribeLikes(); unsubscribeLikes = null; }
  whenFirebaseReady(() => {
    unsubscribeLikes = window.watchLikesForPost(id, (count) => { countEl.textContent = count; });
  });
  btnEl.onclick = () => {
    whenFirebaseReady(() => {
      window.toggleLikePost(id, (nowLiked) => {
        if (nowLiked === null) return;
        btnEl.classList.toggle('liked', nowLiked);
      });
    });
  };
}

/* ============ GRID ============ */

function renderGrid(){
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  const grid = document.getElementById('post-grid');
  grid.innerHTML = '';

  const homePosts = getHomePosts();
  const filtered = homePosts.filter(p => {
    const matchesCategory = currentCategory === null || p.category === currentCategory;
    const haystack = (p.title + ' ' + p.excerpt).toLowerCase();
    const matchesQuery = query === '' || haystack.includes(query);
    return matchesCategory && matchesQuery;
  });

  document.getElementById('result-count').textContent =
    filtered.length === homePosts.length ? `${homePosts.length} FASES` : `${filtered.length} DE ${homePosts.length} FASES`;

  if (filtered.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'GAME OVER — nada encontrado. Tente outra palavra ou remova o filtro.';
    grid.appendChild(empty);
    return;
  }

  filtered.forEach((p, i) => {
    const card = document.createElement('article');
    card.className = 'post-card';
    card.tabIndex = 0;
    card.innerHTML = `
      ${p.image ? `<img class="card-thumb" src="${p.image}" alt="" loading="lazy">` : ''}
      <div class="post-meta-row">
        <span>${formatDate(p.date)}</span>
      </div>
      <h2>${p.title}</h2>
      <p class="excerpt">${p.excerpt}</p>
      <div class="card-tags"><span>${(CATEGORY_LABELS[p.category] || p.category).toUpperCase()}</span></div>
      <div class="card-foot">
        <span>LER →</span>
        <button class="like-btn" data-id="${p.id}">♥ <span>0</span></button>
      </div>
    `;
    card.addEventListener('click', (e) => {
      if (e.target.closest('.like-btn')) return;
      openPost(p.id);
    });
    card.addEventListener('keypress', (e) => { if (e.key === 'Enter') openPost(p.id); });
    const likeBtn = card.querySelector('.like-btn');
    wireLikeButtonStatic(p.id, likeBtn, likeBtn.querySelector('span'));
    grid.appendChild(card);
    requestAnimationFrame(() => setTimeout(() => card.classList.add('show'), i * 40));
  });
}

/* ============ POST VIEW ============ */
async function openPost(id, updateUrl){
  const post = MATERIAS.find(p => p.id === id);
  if (!post) return;
  currentPostId = id;

  if (updateUrl !== false){
    const url = new URL(window.location.href);
    url.searchParams.set('post', id);
    history.pushState({ post: id }, '', url);
  }

  document.getElementById('view-hero').classList.add('hidden');
  document.querySelector('.controls').classList.add('hidden');
  document.getElementById('view-list').classList.add('hidden');
  document.getElementById('view-post').classList.remove('hidden');
  document.querySelectorAll('nav.site a').forEach(a => a.classList.remove('active'));

  document.getElementById('post-eyebrow').textContent = (CATEGORY_LABELS[post.category] || post.category).toUpperCase();
  document.getElementById('post-title').textContent = post.title;
  document.getElementById('post-meta').innerHTML = `<span>${formatDate(post.date)}</span>`;
  document.getElementById('post-body').innerHTML = '<p>Carregando matéria...</p>';
  window.scrollTo({ top: 0 });

  /* O texto da matéria vive em Postagens/<id>.md, escrito em
     Markdown. Buscamos o arquivo e convertemos pra HTML aqui. */
  let markdown;
  try {
    const res = await fetch(`Postagens/${post.id}.md`);
    if (!res.ok) throw new Error('arquivo não encontrado');
    markdown = await res.text();
  } catch (err) {
    document.getElementById('post-body').innerHTML =
      '<p>Não foi possível carregar o texto dessa matéria. Verifique se o arquivo ' +
      `<code>Postagens/${post.id}.md</code> existe.</p>`;
    return;
  }

  const words = markdown.trim().split(/\s+/).filter(Boolean).length;
  const minutes = Math.max(1, Math.round(words / 180));
  document.getElementById('post-meta').innerHTML = `
    <span>${formatDate(post.date)}</span>
    <span>${minutes} MIN DE LEITURA</span>
  `;

  document.getElementById('post-body').innerHTML =
    marked.parse(markdown) +
    (post.video ? `
      <div class="post-video">
        <iframe
          src="https://www.youtube-nocookie.com/embed/${post.video}"
          title="Vídeo do YouTube"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
          loading="lazy">
        </iframe>
      </div>
    ` : '') +
    (post.file ? `
      <div class="post-file">
        <a class="dl-btn" href="${post.file}" download>${post.fileLabel || 'BAIXAR ARQUIVO'} ▾</a>
      </div>
    ` : '');

  const likeBtn = document.getElementById('post-like-btn');
  const likeCountEl = document.getElementById('post-like-count');
  wireLikeButtonLive(post.id, likeBtn, likeCountEl);

  window.loadCommentsForPost(post.id);
}

function setActiveNav(id){
  document.querySelectorAll('nav.site a').forEach(a => a.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

function goHome(updateUrl){
  currentPostId = null;
  document.getElementById('view-hero').classList.remove('hidden');
  document.querySelector('.controls').classList.remove('hidden');
  document.getElementById('view-list').classList.remove('hidden');
  document.getElementById('view-post').classList.add('hidden');
  setActiveNav('nav-home');
  if (updateUrl !== false){
    const url = new URL(window.location.href);
    url.searchParams.delete('post');
    history.pushState({}, '', url);
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ============ SEARCH ============ */
document.getElementById('search-input').addEventListener('input', renderGrid);

/* ============ INIT ============ */
renderFeaturedPost();
renderTags();
renderGrid();

/* Se chegou aqui por um link tipo index.html?post=3 (vindo de
   retro.html ou atuais.html), abre a matéria certa direto. */
(function openFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const postId = parseInt(params.get('post'), 10);
  if (!isNaN(postId)){
    openPost(postId, false);
  }
})();

/* Suporte ao botão "voltar" do navegador entre a home e uma matéria. */
window.addEventListener('popstate', () => {
  const params = new URLSearchParams(window.location.search);
  const postId = parseInt(params.get('post'), 10);
  if (!isNaN(postId)){
    openPost(postId, false);
  } else {
    goHome(false);
  }
});
</script>
</body>
</html>
